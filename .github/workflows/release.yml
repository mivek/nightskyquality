name: Release
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: python-semantic-release/python-semantic-release-action@v10.5.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
